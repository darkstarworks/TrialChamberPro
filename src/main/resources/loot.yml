# Note: custom-effect-type can be any PotionEffectType:
# BAD_OMEN, HERO_OF_THE_VILLAGE, LUCK, UNLUCK, GLOWING, etc.
# This is different from potion-type (which is for standard potions).
#
# effect-duration behavior:
# - For potion-type items: Auto-calculates based on potion type (TIPPED_ARROW = 1/8 of potion duration)
# - For custom-effect-type items: Uses hardcoded defaults (can be overridden)
# - Always optional: Specify to override the automatic/default duration
#
# ====== ENCHANTMENT RANGES ======
