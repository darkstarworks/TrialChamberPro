# ====== GOAT HORNS (8 VARIANTS) ======
# Goat Horns have 8 different instrument variants, each playing a unique sound.
# Use the "instrument" field to specify which variant to drop.
#
#      - type: GOAT_HORN
#        amount-min: 1
#        amount-max: 1
#        weight: 8.0
#        instrument: PONDER  # The "Ponder" goat horn sound
#        name: "&6Horn of Contemplation"
#
#      - type: GOAT_HORN
#        amount-min: 1
#        amount-max: 1
#        weight: 5.0
#        instrument: DREAM   # The rarest "Dream" goat horn sound
#        name: "&5&lDreamer's Horn"
#        lore:
#          - "&7A rare horn that echoes"
#          - "&7through the chambers"
#
# Available instruments (8 variants):
#   PONDER  - Found naturally in regular goats
#   SING    - Found naturally in regular goats
#   SEEK    - Found naturally in regular goats
#   FEEL    - Found naturally in regular goats
#   ADMIRE  - Found only in screaming goats (rare!)
#   CALL    - Found only in screaming goats (rare!)
#   YEARN   - Found only in screaming goats (rare!)
#   DREAM   - Found only in screaming goats (rare!)
#
# Note: You can use full names like "PONDER_GOAT_HORN" or short names like "PONDER"
#
# ====== COMBINING EVERYTHING ======
# You can mix and match any/all features!
#
#      - type: DIAMOND_SWORD
#        amount-min: 1
#        amount-max: 1
#        weight: 5.0
#        name: "&6&lLegendary Blade"
#        lore:
#          - "&7Forged in ancient trials"
#          - "&7Carries the mark of champions"
#        enchantment-ranges:      # Fixed enchantment with random level
#          - "SHARPNESS:4:5"
#        random-enchantment-pool: # PLUS one random enchantment
#          - "LOOTING:2:3"
#          - "SWEEPING_EDGE:2:3"
#          - "FIRE_ASPECT:1:2"
#        durability-min: 100      # Slightly used
#        durability-max: 300
#
# ====== AVAILABLE POTION TYPES ======
# Use these for potion-type field:
# SPEED, SLOWNESS, STRENGTH, INSTANT_HEAL, INSTANT_DAMAGE, JUMP_BOOST,
# REGENERATION, RESISTANCE, FIRE_RESISTANCE, WATER_BREATHING, INVISIBILITY,
# NIGHT_VISION, WEAKNESS, POISON, WITHER, TURTLE_MASTER, SLOW_FALLING
#
# ====== NOTES ======
# - Fixed enchantments use: enchantments: ["ENCHANTMENT:LEVEL"]
# - Enchantment ranges use: enchantment-ranges: ["ENCHANTMENT:MIN:MAX"]
# - Random pool uses: random-enchantment-pool: ["ENCHANTMENT:MIN:MAX", ...]
# - You can combine fixed, ranges, AND random pool on the same item!
# - Durability values are damage (higher = more damaged)
# - Ominous potions are 1.21+ exclusive feature
# - All enchantment names: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/enchantments/Enchantment.html

# ============================================
# COMMAND REWARDS (ECONOMY & PERMISSIONS)
# ============================================
# Run console commands when a player opens a vault!
# Great for economy rewards, permissions, titles, or any command-based rewards.
#
# IMPORTANT: Command rewards are NOT added to weighted-items!
# They go in a separate "command-rewards" list at the pool level.
#
# ====== BASIC EXAMPLE ======
#  default:
#    min-rolls: 3
#    max-rolls: 5
#    weighted-items:
#      - type: DIAMOND
#        amount-min: 1
#        amount-max: 3
#        weight: 10.0
#
#    # Command rewards run with specified probability
#    command-rewards:
#      - weight: 25.0              # 25% chance
#        commands:
#          - "eco give {player} 1000"
#        display-name: "&6+1000 Coins"
#
#      - weight: 10.0              # 10% chance
#        commands:
#          - "lp user {player} permission set special.vault.bonus true"
#        display-name: "&5Special Permission Unlocked!"
#
# ====== MULTI-POOL WITH COMMANDS ======
#  premium-vault:
#    pools:
#      # Regular items pool
#      - name: items
#        min-rolls: 3
#        max-rolls: 5
#        weighted-items:
#          - type: DIAMOND
#            amount-min: 1
#            amount-max: 3
#            weight: 10.0
#
#      # Bonus rewards pool (commands)
#      - name: bonuses
#        min-rolls: 1
#        max-rolls: 1
#        command-rewards:
#          - weight: 50.0
#            commands:
#              - "eco give {player} 500"
#            display-name: "&6+500 Coins"
#
#          - weight: 30.0
#            commands:
#              - "eco give {player} 1000"
#            display-name: "&6+1000 Coins"
#
#          - weight: 15.0
#            commands:
#              - "eco give {player} 5000"
#              - "give {player} nether_star 1"
#            display-name: "&e&lJACKPOT! &6+5000 Coins"
#
#          - weight: 5.0
#            commands:
#              - "lp user {player} parent add vip"
#              - "eco give {player} 10000"
#              - "give {player} elytra 1"
#            display-name: "&5&lULTRA RARE! &dVIP Rank!"
#
# ====== AVAILABLE PLACEHOLDERS ======
# {player} - Player's name
# {uuid}   - Player's UUID
#
# ====== NOTES ======
# - Commands run as CONSOLE (OP permissions)
# - Weight is probability (higher = more likely)
# - Multiple commands execute in order
# - Player receives a message with the display-name
# - Works with Vault (economy), LuckPerms (permissions), any command
#
# ====== EXAMPLES ======
# Economy (requires Vault):
#   - "eco give {player} 1000"
#   - "eco take {player} 500"
#
# Permissions (LuckPerms):
#   - "lp user {player} permission set special.perk true"
#   - "lp user {player} parent add vip"
#
# Items:
#   - "give {player} diamond 64"
#
# Experience:
#   - "xp add {player} 1000"
#
# Titles:
#   - "title {player} title {\"text\":\"&6Rare Reward!\",\"color\":\"gold\"}"
#
# Multiple actions:
#   - "eco give {player} 5000"
#   - "give {player} elytra 1"
#   - "xp add {player} 500"
