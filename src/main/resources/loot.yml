#            weight: 1.0
#            name: "&5&lUltra Rare!"
#
# Benefits of multi-pool system:
# - Each pool rolls independently (more predictable loot)
# - Better control over loot distribution (common vs rare vs unique)
# - Matches vanilla Trial Chamber behavior
# - Can have 0-roll pools for bonus/rare items
#
# Note: GUI loot editor supports both legacy and multi-pool formats!
# ============================================
# VANILLA-ACCURATE LOOT TABLES (READY TO USE!)
# ============================================
# Faithful recreations of Minecraft's vanilla 1.21 Trial Chamber loot,
# transcribed from the unmodified game's datapack JSONs at
#   data/minecraft/loot_table/chests/trial_chambers/*.json
#
# Vanilla vaults use THREE pools that roll independently:
#   1. rare-or-common — 1 item: 80% picked from rare table, 20% from common
#   2. common         — 1-3 additional common items
#   3. unique         — 25% chance for 1 ultra-rare item (normal vaults)
#                       75% chance for 1 ultra-rare item (ominous vaults)
#
# To activate: copy a block below, remove the leading "# " from each line,
# and paste it under `loot-tables:` (replacing or alongside `default` /
# `ominous-default`). You can also reference these by name from per-chamber
# loot overrides (Chamber GUI → Settings → Loot Overrides).
#
# Fidelity notes — places where the plugin's schema can't match vanilla 1:1:
#  - Vanilla's "unique pool fires 25%/75% of the time" is expressed here as
#    `min-rolls: 0, max-rolls: 1` (rolls 0 or 1 uniformly → ~50% per opening).
#    For normal vaults this is ~2x more generous than vanilla; halve every
#    unique-pool weight to compensate, or set `max-rolls: 0` to disable.
#    For ominous vaults it's slightly stingier than vanilla 75% — bump
#    weights if you want more uniques.
#  - Vanilla `enchant_with_levels` (the enchanting-table algorithm) is
#    approximated with `random-enchantment-pool` (picks ONE random enchant
#    from the pool). Most server admins prefer this predictability.
#  - Vanilla shield uses `set_damage` with fraction 0.5-1.0 → damage 0-168
#    on a 336-max shield. Reproduced here as `durability-min: 0, max: 168`.
#  - Vanilla ominous bottles use `set_ominous_bottle_amplifier` with a
#    random amplifier range. Reproduced here as separate entries per Bad
#    Omen level, with weights summing to vanilla's total weight.
